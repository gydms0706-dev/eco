<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기술은 안전한데, 우리는 왜 수돗물을 마시지 않을까?</title>
  <meta name="description" content="한·일 수돗물 인식 비교를 통해 본 묘한 거부감의 원인" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #080808;
      color: #f0f0f0;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── SLIDE SHELL ── */
    #slide {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 62fr 38fr;
      position: relative;
    }

    /* ═══════════════════════════════════
       LEFT — TEXT
    ═══════════════════════════════════ */
    #left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 2vw 0 clamp(48px, 6vw, 96px);
      position: relative;
    }

    /* thin top accent line */
    .top-rule {
      width: 0;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin-bottom: clamp(28px, 4vh, 56px);
      transition: width 0.7s ease 0.1s;
    }
    #left.visible .top-rule { width: 40px; }

    /* eyebrow */
    .eyebrow {
      font-size: clamp(10px, 0.85vw, 12px);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      font-weight: 400;
      margin-bottom: clamp(20px, 3.5vh, 44px);
      opacity: 0;
      transition: opacity 0.5s ease 0.2s;
    }
    #left.visible .eyebrow { opacity: 1; }

    /* headline */
    .hl-wrap {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.2vh, 16px);
      margin-bottom: clamp(28px, 4vh, 52px);
    }

    .hl {
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 1.1;
      word-break: keep-all;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .hl-sm {
      font-size: clamp(24px, 3.2vw, 46px);
      color: rgba(240,240,240,0.55);
      font-weight: 700;
      transition-delay: 0.15s;
    }
    .hl-lg {
      font-size: clamp(38px, 5.8vw, 82px);
      color: #f0f0f0;
      transition-delay: 0.28s;
    }
    .hl-lg .hl-sub {
      display: block;
      font-size: clamp(32px, 4.8vw, 68px);
      color: rgba(240,240,240,0.82);
      transition-delay: 0.38s;
    }
    #left.visible .hl { opacity: 1; transform: none; }

    /* subtitle */
    .subtitle {
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 300;
      color: rgba(255,255,255,0.32);
      line-height: 1.75;
      letter-spacing: 0.02em;
      word-break: keep-all;
      margin-bottom: clamp(36px, 5.5vh, 70px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.55s ease 0.5s, transform 0.55s ease 0.5s;
    }
    #left.visible .subtitle { opacity: 1; transform: none; }

    /* bottom meta row */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.5s ease 0.7s;
    }
    #left.visible .meta-row { opacity: 1; }

    .meta-sep {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.1);
    }

    .team-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-bottom: 8px;
    }
    .team-names {
      display: flex; flex-wrap: wrap; gap: 0;
    }
    .name-item {
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 400;
      color: rgba(240,240,240,0.45);
      letter-spacing: 0.06em;
    }
    .name-item:not(:last-child)::after {
      content: '·';
      margin: 0 7px;
      color: rgba(255,255,255,0.15);
    }

    .slide-no {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.15);
      white-space: nowrap;
    }

    /* ═══════════════════════════════════
       RIGHT — WATER GLASS ILLUSTRATION
    ═══════════════════════════════════ */
    #right {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #right-inner {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease 0.35s;
    }
    #right-inner.visible { opacity: 1; }

    #glass-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── HINT ── */
    #hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .space-key {
      width: 52px; height: 22px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 3px;
      animation: keyPulse 2.4s ease-in-out infinite;
    }
    @keyframes keyPulse {
      0%,100% { border-color: rgba(255,255,255,0.08); }
      50%      { border-color: rgba(255,255,255,0.3); }
    }
    #hint p {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      font-weight: 300;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<section id="slide" aria-label="표지 슬라이드">

  <!-- ─── LEFT ─────────────────────── -->
  <div id="left">
    <div class="top-rule" aria-hidden="true"></div>
    <p class="eyebrow">수돗물 인식 비교 연구 &nbsp;·&nbsp; 2026</p>

    <div class="hl-wrap">
      <span class="hl hl-sm">기술은 안전한데,</span>
      <span class="hl hl-lg">
        우리는 왜<br/>
        <span class="hl hl-sub">수돗물을<br/>마시지 않을까?</span>
      </span>
    </div>

    <p class="subtitle">
      한·일 수돗물 인식 비교를 통해 본<br/>
      '묘한 거부감'의 원인
    </p>

    <div class="meta-row">
      <div>
        <p class="team-label">발표자</p>
        <div class="team-names" role="list">
          <span class="name-item" role="listitem">성민재</span>
          <span class="name-item" role="listitem">김의현</span>
          <span class="name-item" role="listitem">문효은</span>
          <span class="name-item" role="listitem">배승훈</span>
          <span class="name-item" role="listitem">홍세연</span>
        </div>
      </div>
      <div class="meta-sep" aria-hidden="true"></div>
      <span class="slide-no">01 / 13</span>
    </div>
  </div>

  <!-- ─── RIGHT ────────────────────── -->
  <div id="right" aria-hidden="true">
    <div id="right-inner">
      <svg id="glass-svg" viewBox="0 0 420 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <!-- water fill gradient — very subtle white -->
          <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.06"/>
          </linearGradient>

          <!-- glass body gradient -->
          <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
            <stop offset="40%"  stop-color="white" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.10"/>
          </linearGradient>

          <!-- pour stream gradient -->
          <linearGradient id="streamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.10"/>
          </linearGradient>

          <!-- clip for water fill inside glass -->
          <clipPath id="glassClip">
            <path d="M148,290 L162,560 Q162,575 178,575 L242,575 Q258,575 258,560 L272,290 Z"/>
          </clipPath>

          <!-- ripple clip -->
          <clipPath id="rippleClip">
            <rect x="145" y="540" width="130" height="40"/>
          </clipPath>

          <!-- surface shimmer -->
          <linearGradient id="shimmerH" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="white" stop-opacity="0">
              <animate attributeName="offset" values="0;1" dur="2s" repeatCount="indefinite"/>
            </stop>
            <stop offset="20%"  stop-color="white" stop-opacity="0.25">
              <animate attributeName="offset" values="0.2;1.2" dur="2s" repeatCount="indefinite"/>
            </stop>
            <stop offset="40%"  stop-color="white" stop-opacity="0">
              <animate attributeName="offset" values="0.4;1.4" dur="2s" repeatCount="indefinite"/>
            </stop>
          </linearGradient>
        </defs>

        <!-- ── PITCHER / faucet above ── -->
        <!-- pitcher body -->
        <path d="M175,80 L175,185 Q175,200 185,210 L210,240 Q215,248 210,255 Q205,260 200,255 L176,230"
          fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.22" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- pitcher spout -->
        <path d="M175,120 Q145,115 140,130 Q136,145 160,160 L175,165"
          fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.18" stroke-linecap="round"/>
        <!-- pitcher handle -->
        <path d="M200,90 Q230,90 230,130 Q230,170 200,170"
          fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.18" stroke-linecap="round"/>
        <!-- pitcher base -->
        <line x1="162" y1="185" x2="202" y2="185" stroke="white" stroke-width="1.2" stroke-opacity="0.2"/>

        <!-- ── POUR STREAM (animated) ── -->
        <!-- main stream — animates from thin to flowing -->
        <g id="stream">
          <!-- stream body -->
          <path id="streamPath"
            d="M210,255 Q212,275 210,290 Q208,310 210,330 Q212,345 210,360 Q208,375 210,390"
            fill="none" stroke="white" stroke-width="3.5" stroke-opacity="0" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0;0.22;0.22;0.22" dur="0.1s" begin="reveal" fill="freeze"/>
          </path>

          <!-- stream taper top -->
          <path d="M209,255 Q211,275 209,295"
            fill="none" stroke="white" stroke-width="5" stroke-opacity="0" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0;0.15;0.15" dur="0.1s" begin="reveal" fill="freeze"/>
          </path>

          <!-- animated falling water column -->
          <rect x="207" y="255" width="6" height="0" rx="3"
            fill="white" fill-opacity="0.18">
            <animate attributeName="height" values="0;140" dur="0.8s" begin="reveal" fill="freeze"/>
          </rect>

          <!-- stream wobble — continuous after reveal -->
          <path d="M210,255 Q213,295 208,330 Q213,360 210,395"
            fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.12" stroke-linecap="round">
            <animate attributeName="d"
              values="M210,255 Q213,295 208,330 Q213,360 210,395;
                      M210,255 Q207,295 212,330 Q207,360 210,395;
                      M210,255 Q213,295 208,330 Q213,360 210,395"
              dur="1.8s" repeatCount="indefinite"/>
          </path>
        </g>

        <!-- ── GLASS BODY ── -->
        <!-- glass outline — slightly tapered, flat bottom -->
        <path d="M148,290 L162,560 Q162,578 178,578 L242,578 Q258,578 258,560 L272,290 Z"
          fill="url(#glassGrad)"
          stroke="white" stroke-width="1.2" stroke-opacity="0.25"/>




        <!-- ── WATER INSIDE GLASS (rising animation) ── -->
        <g clip-path="url(#glassClip)">
          <!-- water body -->
          <rect x="145" y="578" width="130" height="0" fill="url(#waterGrad)" rx="0">
            <animate attributeName="y"      values="578;395;395" dur="1.6s" begin="reveal" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
            <animate attributeName="height" values="0;183;183"   dur="1.6s" begin="reveal" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
          </rect>

          <!-- water surface shimmer -->
          <rect x="145" y="390" width="130" height="12" fill="url(#shimmerH)" opacity="0"/>
          <!-- shimmer appears after water rises -->
          <rect x="145" y="390" width="130" height="6" fill="white" fill-opacity="0">
            <animate attributeName="fill-opacity" values="0;0.08;0.04;0.08" dur="2.2s" begin="reveal" repeatCount="indefinite"/>
          </rect>
        </g>




        <!-- ── RIPPLE at impact point ── -->
        <g clip-path="url(#rippleClip)">
          <!-- ripple 1 -->
          <ellipse cx="210" cy="395" rx="0" ry="0" fill="none" stroke="white" stroke-opacity="0">
            <animate attributeName="rx" values="0;36" dur="1.2s" begin="reveal" repeatCount="indefinite"/>
            <animate attributeName="ry" values="0;6"  dur="1.2s" begin="reveal" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.18;0" dur="1.2s" begin="reveal" repeatCount="indefinite"/>
            <animate attributeName="stroke-width"   values="1.5;0.3" dur="1.2s" begin="reveal" repeatCount="indefinite"/>
          </ellipse>
          <!-- ripple 2 offset -->
          <ellipse cx="210" cy="395" rx="0" ry="0" fill="none" stroke="white" stroke-opacity="0">
            <animate attributeName="rx" values="0;28" dur="1.2s" begin="reveal+0.4s" repeatCount="indefinite"/>
            <animate attributeName="ry" values="0;5"  dur="1.2s" begin="reveal+0.4s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.14;0" dur="1.2s" begin="reveal+0.4s" repeatCount="indefinite"/>
            <animate attributeName="stroke-width"   values="1;0.2" dur="1.2s" begin="reveal+0.4s" repeatCount="indefinite"/>
          </ellipse>
        </g>

        <!-- ── BUBBLES rising in glass ── -->
        <!-- bubble 1 -->
        <circle cx="190" cy="560" r="2.5" fill="none" stroke="white" stroke-width="0.7" stroke-opacity="0">
          <animate attributeName="cy"            values="560;400"  dur="2.5s" begin="reveal+0.8s" repeatCount="indefinite" calcMode="linear"/>
          <animate attributeName="stroke-opacity" values="0;0.18;0" dur="2.5s" begin="reveal+0.8s" repeatCount="indefinite"/>
        </circle>
        <!-- bubble 2 -->
        <circle cx="220" cy="540" r="1.8" fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0">
          <animate attributeName="cy"            values="540;400"  dur="2s" begin="reveal+1.4s" repeatCount="indefinite" calcMode="linear"/>
          <animate attributeName="stroke-opacity" values="0;0.14;0" dur="2s" begin="reveal+1.4s" repeatCount="indefinite"/>
        </circle>
        <!-- bubble 3 -->
        <circle cx="200" cy="550" r="1.5" fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0">
          <animate attributeName="cy"            values="550;405"  dur="3s" begin="reveal+2s" repeatCount="indefinite" calcMode="linear"/>
          <animate attributeName="stroke-opacity" values="0;0.12;0" dur="3s" begin="reveal+2s" repeatCount="indefinite"/>
        </circle>

        <!-- ── GLASS BASE shadow line ── -->
        <ellipse cx="210" cy="590" rx="50" ry="4"
          fill="white" fill-opacity="0.04"/>
        <ellipse cx="210" cy="594" rx="36" ry="2.5"
          fill="white" fill-opacity="0.03"/>

        <!-- ── tiny label: 수돗물 ── -->
        <text x="210" y="650"
          font-family="'Noto Sans KR', sans-serif"
          font-size="10" fill="white" fill-opacity="0.15"
          letter-spacing="6" text-anchor="middle"
          font-weight="300">수돗물</text>
      </svg>
    </div>
  </div>

  <!-- HINT overlay -->
  <div id="hint" aria-hidden="true">
    <div class="space-key"></div>
    <p>Space to begin</p>
  </div>

</section>

<script>
  const leftEl     = document.getElementById('left');
  const rightInner = document.getElementById('right-inner');
  const hint       = document.getElementById('hint');

  let revealed = false;

  function reveal() {
    if (revealed) return;
    revealed = true;

    hint.style.opacity = '0';
    setTimeout(() => hint.style.display = 'none', 450);

    leftEl.classList.add('visible');
    rightInner.classList.add('visible');

    // Trigger SVG begin="reveal" animations via SMIL
    document.querySelectorAll('animate, animateTransform').forEach(el => {
      const begin = el.getAttribute('begin') || '';
      if (begin.startsWith('reveal')) {
        const delay = begin.includes('+') ? parseFloat(begin.split('+')[1]) * 1000 : 0;
        setTimeout(() => {
          try { el.beginElement(); } catch(e) {}
        }, delay);
      }
    });
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); reveal(); }
  });
  document.addEventListener('click', reveal);
  document.addEventListener('touchend', reveal, { passive: true });
</script>
</body>
</html>
