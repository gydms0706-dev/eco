<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기술은 안전한데, 우리는 왜 수돗물을 마시지 않을까?</title>
  <meta name="description" content="한·일 수돗물 인식 비교를 통해 본 묘한 거부감의 원인 — 웹 프레젠테이션 표지" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #050505;
      --white:   #F5F5F5;
      --muted:   #A7A7A7;
      --accent:  #48D7E8;
      --accent2: #1a8fa0;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ───────── LAYOUT ───────── */
    #slide {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    /* ───────── LEFT PANEL ───────── */
    #left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(40px, 6vw, 100px) clamp(32px, 5vw, 80px) clamp(40px, 6vw, 100px) clamp(48px, 7vw, 120px);
      position: relative;
      z-index: 2;
    }

    /* thin vertical accent bar */
    #left::before {
      content: '';
      position: absolute;
      left: clamp(24px, 3.5vw, 54px);
      top: 50%;
      transform: translateY(-50%) scaleY(0);
      transform-origin: top;
      width: 1.5px;
      height: clamp(80px, 16vh, 180px);
      background: linear-gradient(to bottom, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
      opacity: 0;
      transition: transform 0.75s cubic-bezier(0.4,0,0.2,1) 0.1s,
                  opacity 0.75s ease 0.1s;
    }
    #left.visible::before {
      transform: translateY(-50%) scaleY(1);
      opacity: 0.55;
    }

    /* tag */
    .tag {
      font-size: clamp(10px, 0.9vw, 13px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 400;
      margin-bottom: clamp(20px, 3vh, 40px);
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.05s, transform 0.5s ease 0.05s;
    }
    .tag::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--accent);
    }
    #left.visible .tag { opacity: 1; transform: none; }

    /* title lines */
    .title-line {
      display: block;
      word-break: keep-all;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .line1 {
      font-size: clamp(22px, 3vw, 44px);
      font-weight: 700;
      color: rgba(245,245,245,0.75);
      line-height: 1.3;
      letter-spacing: -0.01em;
      transition-delay: 0.12s;
    }
    .line2 {
      font-size: clamp(28px, 4.2vw, 62px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -0.025em;
      margin-top: 4px;
      transition-delay: 0.22s;
    }
    .line2 em {
      font-style: normal;
      color: var(--accent);
    }
    #left.visible .title-line { opacity: 1; transform: none; }

    /* divider */
    .divider {
      width: 0;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: clamp(18px, 3vh, 36px) 0;
      transition: width 0.6s ease 0.5s;
    }
    #left.visible .divider { width: 56px; }

    /* subtitle */
    .subtitle {
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      letter-spacing: 0.01em;
      word-break: keep-all;
      margin-bottom: clamp(28px, 4vh, 52px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.6s, transform 0.5s ease 0.6s;
    }
    #left.visible .subtitle { opacity: 1; transform: none; }

    /* team */
    .team-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-bottom: 10px;
      opacity: 0;
      transition: opacity 0.5s ease 0.7s;
    }
    #left.visible .team-label { opacity: 1; }

    .team-names {
      display: flex; flex-wrap: wrap; gap: 0;
      opacity: 0;
      transition: opacity 0.5s ease 0.8s;
    }
    #left.visible .team-names { opacity: 1; }

    .name-item {
      font-size: clamp(12px, 1.2vw, 15px);
      font-weight: 400;
      color: rgba(245,245,245,0.6);
      letter-spacing: 0.04em;
    }
    .name-item:not(:last-child)::after {
      content: '·';
      margin: 0 8px;
      color: rgba(255,255,255,0.18);
    }

    /* slide number */
    #slide-number {
      position: absolute;
      bottom: clamp(20px, 3vh, 40px);
      left: clamp(48px, 7vw, 120px);
      font-size: 11px;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.18);
      font-weight: 300;
      opacity: 0;
      transition: opacity 0.5s ease 1s;
    }
    #left.visible + #right ~ #slide-number { opacity: 1; }
    #slide-number.visible { opacity: 1; }

    /* ───────── RIGHT PANEL ───────── */
    #right {
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    /* overall right-side fade-in */
    #right-inner {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }
    #right-inner.visible { opacity: 1; }

    /* SVG canvas */
    #water-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* ── floating label badges ───────────────── */
    .water-badge {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1px solid rgba(72,215,232,0.2);
      border-radius: 2px;
      background: rgba(5,5,5,0.7);
      backdrop-filter: blur(4px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #right-inner.visible .water-badge { opacity: 1; transform: none; }

    .water-badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .water-badge span {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
    }
    .badge-purification { top: 18%; left: 8%; transition-delay: 0.55s; }
    .badge-pipe         { top: 42%; left: 18%; transition-delay: 0.75s; }
    .badge-tap          { top: 65%; left: 8%; transition-delay: 0.95s; }
    .badge-trust        { top: 80%; left: 22%; transition-delay: 1.1s; }

    /* ── stat callout ───────────────── */
    .stat-callout {
      position: absolute;
      right: 8%;
      top: 20%;
      text-align: right;
      opacity: 0;
      transform: translateX(12px);
      transition: opacity 0.6s ease 0.9s, transform 0.6s ease 0.9s;
    }
    #right-inner.visible .stat-callout { opacity: 1; transform: none; }
    .stat-num {
      font-size: clamp(36px, 5vw, 68px);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .stat-unit { font-size: 0.4em; font-weight: 300; color: var(--muted); }
    .stat-desc {
      font-size: clamp(9px, 0.85vw, 12px);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      margin-top: 6px;
    }

    /* separator line between panels */
    #panel-sep {
      position: absolute;
      left: 50%;
      top: 10%;
      bottom: 10%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(72,215,232,0.12) 30%, rgba(72,215,232,0.12) 70%, transparent);
      pointer-events: none;
      z-index: 3;
    }

    /* ───────── HINT ───────── */
    #hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.5s ease;
      z-index: 10;
      pointer-events: none;
    }
    .pulse-box {
      width: 46px; height: 28px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      animation: pulseBox 2.2s ease-in-out infinite;
    }
    .pulse-box::after {
      content: '';
      display: block;
      width: 20px; height: 2px;
      border-radius: 1px;
      background: rgba(255,255,255,0.35);
    }
    @keyframes pulseBox {
      0%,100% { border-color: rgba(255,255,255,0.10); }
      50%      { border-color: rgba(72,215,232,0.5); }
    }
    #hint p {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      font-weight: 300;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<section id="slide" aria-label="표지 슬라이드">

  <!-- panel separator -->
  <div id="panel-sep" aria-hidden="true"></div>

  <!-- ─── LEFT ─────────────────── -->
  <div id="left">
    <p class="tag">수돗물 인식 비교 연구 &nbsp;·&nbsp; 01 / 13</p>

    <h1>
      <span class="title-line line1">기술은 안전한데,</span>
      <span class="title-line line2">우리는 왜<br/>수돗물을 <em>마시지 않을까?</em></span>
    </h1>

    <div class="divider" aria-hidden="true"></div>

    <p class="subtitle">
      한·일 수돗물 인식 비교를 통해 본<br />
      '묘한 거부감'의 원인
    </p>

    <p class="team-label">발표자</p>
    <div class="team-names" role="list">
      <span class="name-item" role="listitem">성민재</span>
      <span class="name-item" role="listitem">김의현</span>
      <span class="name-item" role="listitem">문효은</span>
      <span class="name-item" role="listitem">배승훈</span>
      <span class="name-item" role="listitem">홍세연</span>
    </div>
  </div>

  <!-- ─── RIGHT ────────────────── -->
  <div id="right" aria-hidden="true">
    <div id="right-inner">

      <!-- SVG water graphic -->
      <svg id="water-svg" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <defs>
          <!-- flowing water gradient -->
          <linearGradient id="flowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#48D7E8" stop-opacity="0"/>
            <stop offset="30%" stop-color="#48D7E8" stop-opacity="0.7"/>
            <stop offset="70%" stop-color="#1a8fa0" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#1a8fa0" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#48D7E8" stop-opacity="0.08"/>
            <stop offset="50%" stop-color="#48D7E8" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#48D7E8" stop-opacity="0.05"/>
          </linearGradient>
          <!-- glow filter -->
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <!-- clip for drops -->
          <clipPath id="dropClip1"><ellipse cx="250" cy="340" rx="130" ry="160"/></clipPath>

          <!-- animated water shimmer -->
          <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#48D7E8" stop-opacity="0.0">
              <animate attributeName="stop-opacity" values="0;0.6;0" dur="2.4s" repeatCount="indefinite"/>
            </stop>
            <stop offset="50%" stop-color="#48D7E8" stop-opacity="0.3">
              <animate attributeName="stop-opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#48D7E8" stop-opacity="0.0">
              <animate attributeName="stop-opacity" values="0;0.4;0" dur="2.4s" repeatCount="indefinite"/>
            </stop>
          </linearGradient>
        </defs>

        <!-- ── Background radial glow ── -->
        <ellipse cx="250" cy="350" rx="210" ry="260"
          fill="none" stroke="#48D7E8" stroke-width="0.4" stroke-opacity="0.06"/>
        <ellipse cx="250" cy="350" rx="160" ry="200"
          fill="none" stroke="#48D7E8" stroke-width="0.6" stroke-opacity="0.09"/>

        <!-- ── Main pipe (vertical center) ── -->
        <!-- pipe body -->
        <rect x="228" y="60" width="44" height="560" rx="6"
          fill="url(#pipeGrad)" stroke="#48D7E8" stroke-width="0.8" stroke-opacity="0.2"/>

        <!-- pipe inner flow — animated -->
        <rect x="236" y="60" width="28" height="560" rx="4" fill="url(#flowGrad)">
          <animate attributeName="y" values="60;-500;60" dur="2.8s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
        <!-- second pass offset for continuity -->
        <rect x="236" y="-500" width="28" height="560" rx="4" fill="url(#flowGrad)">
          <animate attributeName="y" values="-500;60;-500" dur="2.8s" repeatCount="indefinite" calcMode="linear" begin="0s"/>
        </rect>

        <!-- shimmer overlay on pipe -->
        <rect x="234" y="60" width="32" height="560" rx="4" fill="url(#shimmer)" opacity="0.6"/>

        <!-- ── Pipe joints / markings ── -->
        <rect x="222" y="155" width="56" height="6" rx="3" fill="#48D7E8" fill-opacity="0.18"/>
        <rect x="222" y="310" width="56" height="6" rx="3" fill="#48D7E8" fill-opacity="0.18"/>
        <rect x="222" y="470" width="56" height="6" rx="3" fill="#48D7E8" fill-opacity="0.18"/>

        <!-- ── Branch pipes (horizontal) ── -->
        <!-- Upper branch left -->
        <path d="M228,180 Q190,180 160,180" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.3" fill="none"/>
        <circle cx="160" cy="180" r="3" fill="#48D7E8" fill-opacity="0.4" filter="url(#glow)"/>

        <!-- Mid branch left -->
        <path d="M228,335 Q185,335 148,335" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.25" fill="none"/>
        <circle cx="148" cy="335" r="3" fill="#48D7E8" fill-opacity="0.35" filter="url(#glow)"/>

        <!-- Lower branch left -->
        <path d="M228,500 Q188,500 155,500" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.25" fill="none"/>
        <circle cx="155" cy="500" r="3" fill="#48D7E8" fill-opacity="0.3" filter="url(#glow)"/>

        <!-- Upper branch right -->
        <path d="M272,220 Q320,220 360,220" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.25" fill="none"/>
        <circle cx="360" cy="220" r="3" fill="#48D7E8" fill-opacity="0.35" filter="url(#glow)"/>

        <!-- Mid branch right -->
        <path d="M272,390 Q330,390 370,390" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.2" fill="none"/>
        <circle cx="370" cy="390" r="3" fill="#48D7E8" fill-opacity="0.3" filter="url(#glow)"/>

        <!-- ── Animated water drops ── -->
        <!-- drop 1 -->
        <ellipse cx="215" cy="630" rx="7" ry="10" fill="#48D7E8" fill-opacity="0" filter="url(#glow)">
          <animate attributeName="cy" values="620;700;700" dur="2.2s" repeatCount="indefinite" begin="0s"/>
          <animate attributeName="fill-opacity" values="0;0.7;0" dur="2.2s" repeatCount="indefinite" begin="0s"/>
          <animate attributeName="ry" values="10;14;4" dur="2.2s" repeatCount="indefinite" begin="0s"/>
        </ellipse>
        <!-- drop 2 -->
        <ellipse cx="250" cy="630" rx="6" ry="9" fill="#48D7E8" fill-opacity="0" filter="url(#glow)">
          <animate attributeName="cy" values="620;700;700" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
          <animate attributeName="fill-opacity" values="0;0.9;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
          <animate attributeName="ry" values="9;13;3" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
        </ellipse>
        <!-- drop 3 -->
        <ellipse cx="285" cy="630" rx="5" ry="8" fill="#48D7E8" fill-opacity="0" filter="url(#glow)">
          <animate attributeName="cy" values="620;700;700" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
          <animate attributeName="fill-opacity" values="0;0.6;0" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
          <animate attributeName="ry" values="8;12;3" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
        </ellipse>

        <!-- ── Tap / faucet icon at bottom ── -->
        <!-- nozzle body -->
        <rect x="234" y="590" width="32" height="22" rx="4"
          fill="none" stroke="#48D7E8" stroke-width="1.4" stroke-opacity="0.5"/>
        <!-- nozzle tip -->
        <rect x="242" y="612" width="16" height="8" rx="2"
          fill="none" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.45"/>
        <!-- handle -->
        <path d="M250,590 L250,575 Q250,568 260,568 L278,568"
          stroke="#48D7E8" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-linecap="round"/>

        <!-- ── Purification icon at top ── -->
        <!-- filtration layers -->
        <line x1="222" y1="80" x2="278" y2="80" stroke="#48D7E8" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="226" y1="90" x2="274" y2="90" stroke="#48D7E8" stroke-width="1" stroke-opacity="0.3"/>
        <line x1="230" y1="100" x2="270" y2="100" stroke="#48D7E8" stroke-width="1" stroke-opacity="0.2"/>
        <!-- reservoir circle -->
        <circle cx="250" cy="55" r="22" fill="none" stroke="#48D7E8" stroke-width="1.2" stroke-opacity="0.35"/>
        <circle cx="250" cy="55" r="10" fill="#48D7E8" fill-opacity="0.12"/>
        <!-- water level in reservoir animated -->
        <ellipse cx="250" cy="60" rx="8" ry="3" fill="#48D7E8" fill-opacity="0.5">
          <animate attributeName="ry" values="3;5;3" dur="1.8s" repeatCount="indefinite"/>
          <animate attributeName="fill-opacity" values="0.5;0.8;0.5" dur="1.8s" repeatCount="indefinite"/>
        </ellipse>

        <!-- ── Floating data particles along pipe ── -->
        <!-- particle track 1 -->
        <circle cx="250" cy="200" r="2" fill="#48D7E8" fill-opacity="0.8" filter="url(#glow)">
          <animate attributeName="cy" values="100;590" dur="3s" repeatCount="indefinite" begin="0s" calcMode="linear"/>
          <animate attributeName="fill-opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="0s"/>
        </circle>
        <!-- particle track 2 -->
        <circle cx="244" cy="200" r="1.5" fill="#48D7E8" fill-opacity="0.5" filter="url(#glow)">
          <animate attributeName="cy" values="100;590" dur="3s" repeatCount="indefinite" begin="1s" calcMode="linear"/>
          <animate attributeName="fill-opacity" values="0;0.7;0.7;0" dur="3s" repeatCount="indefinite" begin="1s"/>
        </circle>
        <!-- particle track 3 -->
        <circle cx="256" cy="200" r="1.8" fill="#48D7E8" fill-opacity="0.6" filter="url(#glow)">
          <animate attributeName="cy" values="100;590" dur="3s" repeatCount="indefinite" begin="2s" calcMode="linear"/>
          <animate attributeName="fill-opacity" values="0;0.6;0.6;0" dur="3s" repeatCount="indefinite" begin="2s"/>
        </circle>

        <!-- ── Node circles at joints ── -->
        <circle cx="250" cy="160" r="5" fill="none" stroke="#48D7E8" stroke-width="1" stroke-opacity="0.4" filter="url(#glow)"/>
        <circle cx="250" cy="315" r="5" fill="none" stroke="#48D7E8" stroke-width="1" stroke-opacity="0.35" filter="url(#glow)"/>
        <circle cx="250" cy="480" r="5" fill="none" stroke="#48D7E8" stroke-width="1" stroke-opacity="0.3" filter="url(#glow)"/>

        <!-- ── Ripple at bottom (splash) ── -->
        <ellipse cx="250" cy="670" rx="30" ry="6" fill="none" stroke="#48D7E8" stroke-width="1" stroke-opacity="0">
          <animate attributeName="rx" values="10;60;10" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
          <animate attributeName="stroke-opacity" values="0;0.4;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
        </ellipse>
        <ellipse cx="250" cy="670" rx="20" ry="4" fill="none" stroke="#48D7E8" stroke-width="1" stroke-opacity="0">
          <animate attributeName="rx" values="8;45;8" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
          <animate attributeName="stroke-opacity" values="0;0.3;0" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
        </ellipse>
      </svg>

      <!-- Floating info badges -->
      <div class="water-badge badge-purification">
        <span class="dot"></span>
        <span>정수장 처리</span>
      </div>
      <div class="water-badge badge-pipe">
        <span class="dot"></span>
        <span>상수도관 이송</span>
      </div>
      <div class="water-badge badge-tap">
        <span class="dot"></span>
        <span>수도꼭지 도달</span>
      </div>
      <div class="water-badge badge-trust">
        <span class="dot" style="background:#FF9D4D"></span>
        <span style="color:rgba(255,157,77,0.7)">신뢰의 간극</span>
      </div>

      <!-- Stat callout -->
      <div class="stat-callout">
        <div class="stat-num">5.3<span class="stat-unit">%</span></div>
        <div class="stat-desc">수돗물 직접 음용률<br/>(한국, 2024)</div>
      </div>

    </div><!-- /right-inner -->
  </div><!-- /right -->

  <!-- hint -->
  <div id="hint" aria-hidden="true">
    <div class="pulse-box"></div>
    <p>Space to begin</p>
  </div>

  <!-- slide number -->
  <div id="slide-number" aria-hidden="true">01 / 13</div>

</section>

<script>
  const leftPanel  = document.getElementById('left');
  const rightInner = document.getElementById('right-inner');
  const hint       = document.getElementById('hint');
  const slideNum   = document.getElementById('slide-number');

  let revealed = false;

  function reveal() {
    if (revealed) return;
    revealed = true;

    hint.style.opacity = '0';
    setTimeout(() => { hint.style.display = 'none'; }, 500);

    leftPanel.classList.add('visible');
    rightInner.classList.add('visible');
    slideNum.classList.add('visible');
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); reveal(); }
  });
  document.addEventListener('click', reveal);
  document.addEventListener('touchend', reveal, { passive: true });
</script>
</body>
</html>
